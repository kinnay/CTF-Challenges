
syntax = "proto3";

package challenge;


message User {
    string username = 1;
    bytes password = 2;
    int32 role = 3;
}

message LoginRequest {
    string username = 1;
    string password = 2;
}

message LoginResponse {
    string token = 1;
}

message RegisterRequest {
    string username = 1;
    string password = 2;
}

message RegisterResponse {
}

message ListUsersRequest {
    string token = 1;
}

message ListUsersResponse {
    repeated User users = 1;
}

message GetFlagRequest {
    string token = 1;
}

message GetFlagResponse {
    string flag = 1;
}
